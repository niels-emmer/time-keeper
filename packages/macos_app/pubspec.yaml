name: time_keeper_macos
description: Time Keeper — macOS status bar app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # macOS tray icon + context menu
  tray_manager: ^0.2.3

  # Window creation and positioning (popover panel)
  window_manager: ^0.3.9

  # HTTP client for the Time Keeper API
  http: ^1.2.0

  # macOS Keychain storage for the API token and URL
  flutter_secure_storage: ^9.0.0

  # State management
  provider: ^6.1.2

  # ISO week number utilities
  intl: ^0.19.0

flutter:
  uses-material-design: true

  assets:
    - assets/tray/
