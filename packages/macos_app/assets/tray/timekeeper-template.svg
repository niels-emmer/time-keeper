<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Time Keeper tray template">
  <!-- Clock face -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#000000" stroke-width="5"/>
  <!-- Hour hand pointing to ~9 o'clock -->
  <line x1="32" y1="32" x2="13" y2="32" stroke="#000000" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand pointing to ~1 o'clock -->
  <line x1="32" y1="32" x2="47" y2="17" stroke="#000000" stroke-width="5" stroke-linecap="round"/>
  <!-- Second/sweep indicator pointing down -->
  <line x1="32" y1="32" x2="32" y2="52" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
  <!-- Center cap -->
  <circle cx="32" cy="32" r="3" fill="#000000"/>
</svg>
