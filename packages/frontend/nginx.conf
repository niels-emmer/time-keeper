server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # SPA fallback: serve index.html for any non-file path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Use Docker's internal DNS resolver; resolve at request time, not startup
    resolver 127.0.0.11 valid=30s;

    # Proxy API requests to the backend, forwarding identity headers set by Authentik's outpost
    location /api/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Forward Authentik embedded outpost identity headers to the backend.
        # X-Internal-Token proves this request came through the trusted frontend
        # nginx proxy and not directly via the api.* subdomain. The backend only
        # trusts X-authentik-email when this token is present and matches the
        # INTERNAL_PROXY_SECRET env var — defence-in-depth against header injection.
        proxy_set_header X-Internal-Token  "${INTERNAL_PROXY_SECRET}";
        proxy_set_header X-authentik-email $http_x_authentik_email;
        proxy_set_header X-authentik-username $http_x_authentik_username;
        proxy_set_header X-authentik-uid $http_x_authentik_uid;
        proxy_set_header X-authentik-groups $http_x_authentik_groups;
        proxy_set_header X-authentik-name $http_x_authentik_name;
    }

    # Cache static assets
    location ~* \.(js|css|png|ico|woff2|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache the service worker or manifest
    location ~* \.(webmanifest|sw\.js)$ {
        add_header Cache-Control "no-cache";
    }
}
