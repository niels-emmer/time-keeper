services:

  # Frontend: React SPA served by nginx, proxies /api/* to backend
  # Auth is handled upstream by Authentik's proxy outpost via NPM forward auth.
  # Authentik sets X-authentik-email on authenticated requests; nginx passes it to the backend.
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    restart: unless-stopped
    environment:
      # Shared with the backend — nginx sets this as X-Internal-Token on every
      # proxied request so the backend can distinguish trusted internal requests
      # (via the frontend nginx) from direct api.* calls. Generate once with:
      #   openssl rand -hex 32
      # and set in a .env file or your deployment secrets manager.
      INTERNAL_PROXY_SECRET: ${INTERNAL_PROXY_SECRET}
    networks:
      - proxy-net
    depends_on:
      backend:
        condition: service_healthy

  # Backend: Express API with SQLite
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      args:
        # Pass the latest git tag so /api/info can report the running version.
        # Falls back to 'dev' if no tags exist.
        APP_VERSION: ${APP_VERSION:-dev}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_PATH: "/data/time-keeper.db"
      # Must match the frontend container's INTERNAL_PROXY_SECRET.
      # When set, the backend only accepts X-authentik-email from requests that
      # carry a matching X-Internal-Token header — preventing header injection
      # via the api.* subdomain even if NPM is misconfigured.
      INTERNAL_PROXY_SECRET: ${INTERNAL_PROXY_SECRET}
    volumes:
      - db-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proxy-net

volumes:
  db-data:
    driver: local

networks:
  proxy-net:
    external: true
